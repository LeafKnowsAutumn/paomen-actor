<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2026炮门演员争霸赛</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
body{background:#1a1c23;color:#fff;padding:20px;max-width:1200px;margin:0 auto}
.title{text-align:center;color:#ff4655;margin:0 0 20px;font-size:24px}

/* 届次栏 */
.edition-bar{background:#252933;padding:12px 15px;border-radius:8px;margin-bottom:15px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.edition-bar .label{color:#aaa;font-size:13px}
.edition-bar .ed-btn{padding:5px 12px;border-radius:20px;border:1px solid #3a4150;background:transparent;color:#aaa;cursor:pointer;font-size:12px}
.ed-btn:hover{background:#3a4150}
.ed-btn.active{background:#ff4655;color:#fff;border-color:#ff4655}
.edition-bar .right-btns{margin-left:auto;display:flex;gap:8px}

/* 弹窗 */
.modal-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#252933;padding:20px;border-radius:12px;width:90%;max-width:540px;max-height:85vh;overflow-y:auto}
.modal h3{color:#ff4655;margin-bottom:15px}
.modal label{color:#aaa;font-size:13px}
.modal input,.modal select{width:100%;padding:6px 8px;background:#3a4150;color:#fff;border:none;border-radius:4px;margin-top:4px;font-size:13px}
.modal .row{display:flex;gap:10px;margin-bottom:12px}
.modal .row>div{flex:1}
.btn-green{background:#28a745;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;width:100%;font-size:13px}
.btn-red{background:#dc3545;color:#fff;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px}
.btn-save{background:#ff4655;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;width:100%;margin-top:10px;font-size:13px}

/* 加演员弹窗 */
.add-actor-modal .pick-row{display:flex;gap:10px;margin-bottom:12px;align-items:center}
.add-actor-modal .pick-row label{color:#aaa;font-size:13px;white-space:nowrap}
.add-actor-modal select,.add-actor-modal input[type="text"]{flex:1;padding:6px 8px;background:#3a4150;color:#fff;border:1px solid #3a4150;border-radius:4px;font-size:13px}
.add-actor-modal .custom-row{display:flex;gap:10px;margin-bottom:12px;align-items:center}
.add-actor-modal .custom-row input[type="text"]{flex:1;padding:6px 8px;background:#3a4150;color:#fff;border:1px solid #3a4150;border-radius:4px;font-size:13px}
.add-actor-modal .save-check{display:flex;align-items:center;gap:6px;margin-bottom:14px;color:#aaa;font-size:13px}
.add-actor-modal .save-check input[type="checkbox"]{width:16px;height:16px;accent-color:#28a745}
.add-actor-modal .btn-add{background:#28a745;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;width:100%;font-size:13px}

/* 演员管理弹窗 */
.actor-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:#3a4150;border-radius:8px}
.actor-item img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #ff4655;flex-shrink:0}
.actor-item .actor-fields{flex:1;display:flex;flex-direction:column;gap:6px}
.actor-item .actor-fields input{width:100%;padding:5px 8px;background:#2d323f;color:#fff;border:none;border-radius:4px;font-size:13px}
.actor-item .actor-fields input::placeholder{color:#666;font-size:11px}

.input-section{background:#252933;padding:15px;border-radius:10px;margin-bottom:20px}
.section-title{color:#ff4655;margin:0 0 10px;font-size:18px}

/* 录入区 - 演员卡片 */
.input-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.round-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.win-select{padding:6px 12px;border-radius:6px;border:1px solid #3a4150;background:#2d323f;color:#fff;font-size:13px;cursor:pointer}
.win-select option{background:#2d323f}

.player-inputs{display:flex;gap:8px;width:100%;flex-wrap:wrap}
.player-card{background:#2d323f;padding:8px;border-radius:8px;flex:1;min-width:130px;text-align:center;position:relative}
.player-card .card-del{position:absolute;top:4px;right:4px;background:transparent;border:none;color:#666;cursor:pointer;font-size:14px;padding:0;line-height:1}
.player-card .card-del:hover{color:#dc3545}
.player-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #ff4655;margin:0 auto 4px;display:block}
.player-name{color:#ff4655;font-weight:bold;margin-bottom:5px;font-size:12px}
.input-group{display:flex;justify-content:space-between;margin-bottom:4px;align-items:center}
.input-group label{width:28px;font-size:11px;color:#aaa;text-align:left}
.input-group input{width:calc(100% - 32px);background:#3a4150;color:#fff;border:none;border-radius:4px;padding:4px;font-size:12px}
.btn-group{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;align-items:center}
.btn-submit{padding:8px 12px;background:#ff4655;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.btn-reset{background:#6c757d;color:#fff;border:none;border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px}
.btn-add-actor{background:#2a4a3a;color:#28a745;border:1px solid #28a745;border-radius:6px;padding:8px 12px;cursor:pointer;font-size:13px}

/* 实力表 */
.result-section{background:#252933;padding:15px;border-radius:10px;margin-bottom:20px;overflow-x:auto}
.stat-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}
.stat-table th,.stat-table td{padding:8px 6px;text-align:center;border-bottom:1px solid #3a4150}
.stat-table th{background:#3a4150;color:#ff4655}
.avg-rt{color:#ff4655;font-weight:bold}
.avg-adr{color:#f0a500;font-weight:bold}

/* 每局详情 */
.round-detail{background:#252933;padding:15px;border-radius:10px;margin-bottom:20px}
.round-item{background:#2d323f;padding:10px;margin-bottom:8px;border-radius:8px}
.round-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.round-title{color:#ff4655;font-weight:bold;font-size:13px}
.win-badge{padding:2px 10px;border-radius:12px;font-size:12px;font-weight:bold}
.win-badge.win{background:#1a3a2a;color:#28a745;border:1px solid #28a745}
.win-badge.lose{background:#3a1a1a;color:#dc3545;border:1px solid #dc3545}
.round-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(85px, 1fr));gap:5px;text-align:center;font-size:11px}
.round-grid .cell-name{color:#ff4655;font-size:11px}
.round-grid .cell-kda{color:#fff}
.round-grid .cell-rt{color:#aaa;font-size:10px}
.round-grid .cell-adr{color:#f0a500;font-size:10px}

.status-bar{background:#252933;padding:10px 15px;border-radius:8px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.status-bar .info{color:#aaa;font-size:13px}
.status-bar .wl{font-size:13px}
.status-bar .wl .w{color:#28a745;font-weight:bold}
.status-bar .wl .l{color:#dc3545;font-weight:bold}
#loading{text-align:center;padding:40px;color:#ff4655;font-size:16px}

@media(max-width:768px){
  .player-card{min-width:calc(50% - 4px)}
  .round-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .player-card{min-width:100%}
}
</style>
</head>
<body>

<!-- 届次栏 -->
<div class="edition-bar" id="editionBar">
  <span class="label">届次：</span>
  <button class="btn-reset" style="font-size:12px" onclick="showNewEdition()">＋ 新建</button>
  <div class="right-btns">
    <button class="btn-reset" style="font-size:12px" onclick="showActorMgr()">🎭 演员</button>
  </div>
</div>

<h1 class="title" id="mainTitle">🔥 2026炮门第一届演员争霸赛</h1>

<!-- 状态栏：场次 + 胜负 -->
<div class="status-bar">
  <div class="info">共 <span id="roundCount">0</span> 局数据</div>
  <div class="wl">战绩：<span class="w" id="winCount">0</span> 胜 <span class="l" id="loseCount">0</span> 负</div>
  <div class="info" id="lastUpdate">等待数据加载...</div>
</div>

<!-- 演员实力表 -->
<div class="result-section">
  <h2 class="section-title">🎭 演员实力表</h2>
  <table class="stat-table">
    <thead><tr><th>排名</th><th>演员</th><th>总K</th><th>总D</th><th>总A</th><th>平均RT</th><th>平均ADR</th><th>场次</th></tr></thead>
    <tbody id="rankBody"></tbody>
  </table>
</div>

<!-- 每局数据详情 -->
<div class="round-detail" id="logs">
  <h2 class="section-title">📋 每局数据详情</h2>
  <div id="loading">正在加载数据...</div>
</div>

<!-- 录入区 -->
<div class="input-section">
  <div class="input-header">
    <h2 class="section-title" style="margin:0">📝 录入本局数据</h2>
    <div class="round-meta">
      <select class="win-select" id="roundResult">
        <option value="">胜负</option>
        <option value="win">🏆 胜</option>
        <option value="lose">💀 负</option>
      </select>
      <button class="btn-add-actor" onclick="showAddActorModal()">＋ 加演员</button>
    </div>
  </div>
  <div class="player-inputs" id="playerInputs"></div>
  <div class="btn-group">
    <button class="btn-submit" id="addBtn">✅ 提交本局</button>
    <button class="btn-reset" id="clearBtn">🗑 清空本届</button>
  </div>
</div>

<!-- 新建届次弹窗 -->
<div class="modal-mask" id="editionModal" style="display:none">
  <div class="modal">
    <h3>🏆 新建届次</h3>
    <div style="margin-bottom:12px">
      <label>届次名称</label>
      <input id="edName" placeholder="如：2026炮门第二届演员争霸赛">
    </div>
    <div class="row">
      <div><label>开始时间</label><input id="edStart" type="date"></div>
      <div><label>结束时间</label><input id="edEnd" type="date"></div>
    </div>
    <button class="btn-save" onclick="createEdition()">✅ 创建</button>
  </div>
</div>

<!-- 演员管理弹窗 -->
<div class="modal-mask" id="actorModal" style="display:none">
  <div class="modal">
    <h3>🎭 演员资料库</h3>
    <div id="actorList"></div>
    <button class="btn-green" onclick="addActorRow()" style="margin:10px 0 4px">＋ 添加演员</button>
    <button class="btn-save" onclick="saveActors()">💾 保存</button>
  </div>
</div>

<!-- 加演员弹窗 -->
<div class="modal-mask" id="addActorModal" style="display:none">
  <div class="modal add-actor-modal">
    <h3>➕ 添加演员到本局</h3>
    <div class="pick-row">
      <label>选择资料库演员：</label>
      <select id="pickActorSelect" style="flex:1;padding:6px 8px;background:#3a4150;color:#fff;border:1px solid #3a4150;border-radius:4px;font-size:13px">
        <option value="">-- 请选择 --</option>
      </select>
    </div>
    <div class="custom-row">
      <label style="color:#aaa;font-size:13px;white-space:nowrap">或自定义名称：</label>
      <input type="text" id="customActorName" placeholder="输入演员名称" style="flex:1">
    </div>
    <div class="save-check">
      <input type="checkbox" id="saveToLib" checked>
      <label for="saveToLib" style="color:#aaa;font-size:13px">同时保存到演员资料库</label>
    </div>
    <button class="btn-add" onclick="confirmAddActor()">✅ 确认添加</button>
  </div>
</div>

<script>
// ===== 配置 =====
const SUPABASE_URL = 'https://jucftwuhdcimdcsrncok.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1Y2Z0d3VoZGNpbWRjc3JuY29rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTA5NzEsImV4cCI6MjA5MzA4Njk3MX0.YZXRe4yQL_CT-JkCtEYrnfWCjbxj_uveoQqot-x9QII';

// ===== 状态 =====
let sb = null;
let editions = [];
let curEd = null;
let rounds = [];
let names = ["ZyWOo","Donk","老登","伊笙","幽月"];
let avatars = [
  "https://raw.githubusercontent.com/LeafKnowsAutumn/paomen-actor/main/images/zywoo.jpg",
  "https://raw.githubusercontent.com/LeafKnowsAutumn/paomen-actor/main/images/donk.jpg",
  "https://raw.githubusercontent.com/LeafKnowsAutumn/paomen-actor/main/images/laodeng.jpg",
  "https://raw.githubusercontent.com/LeafKnowsAutumn/paomen-actor/main/images/yisheng.jpg",
  "https://raw.githubusercontent.com/LeafKnowsAutumn/paomen-actor/main/images/youyue.jpg"
];
const DEFAULT_AVATAR = "https://raw.githubusercontent.com/LeafKnowsAutumn/paomen-actor/main/images/paomen.jpg";

// 录入区临时演员列表（可与 names 不同，支持增删）
let inputActors = []; // [{name, avatar}]

// ===== 工具 =====
function calcRT(k,d){ if(!d) return k; return parseFloat((k/d).toFixed(2)) }

async function loadScript(src){
  return new Promise((ok,err)=>{
    if(window.supabase){ok();return}
    let s=document.createElement('script');s.src=src;
    s.onload=ok;s.onerror=()=>err(new Error(src));document.head.appendChild(s);
  });
}

// ===== 初始化 Supabase =====
async function initSB(){
  try{
    await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
    if(!window.supabase) throw 0;
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return true;
  }catch(e){ return false; }
}

// ===== 确保数据库表结构正确 =====
async function ensureTables(){
  // 尝试 select result 字段，如果失败说明字段不存在，需要提示用户手动执行SQL
  let {error} = await sb.from('rounds').select('result').limit(1);
  if(error && error.message && error.message.includes('result')){
    alert('⚠️ 数据库缺少 result 字段，请在 Supabase SQL Editor 执行：\n\nALTER TABLE public.rounds ADD COLUMN IF NOT EXISTS result TEXT;\nALTER TABLE public.editions DISABLE ROW LEVEL SECURITY;\nALTER TABLE public.rounds DISABLE ROW LEVEL SECURITY;');
  }
}

// ===== 加载所有届次（最新在前）=====
async function loadEditions(){
  let {data,error} = await sb.from('editions').select('*').order('id',{ascending:false});
  if(error) return;
  editions = data||[];
  renderEdBar();
  if(editions.length){
    switchEd(editions[0].id);
  }else{
    showNewEdition();
  }
}

// ===== 渲染届次栏（最新在前）=====
function renderEdBar(){
  let bar = document.getElementById('editionBar');
  let label = bar.querySelector('.label');
  let newBtn = bar.querySelector('.btn-reset');
  let right = bar.querySelector('.right-btns');
  bar.innerHTML = '';
  bar.appendChild(label);
  // editions 已按 id 倒序，直接渲染（最新在最前面）
  editions.forEach(ev=>{
    let b = document.createElement('button');
    b.className = 'ed-btn' + (curEd && curEd.id===ev.id?' active':'');
    b.textContent = ev.name.replace('2026炮门','').replace('演员争霸赛','');
    b.onclick = ()=>switchEd(ev.id);
    bar.appendChild(b);
  });
  bar.appendChild(newBtn);
  bar.appendChild(right);
}

// ===== 切换届次 =====
async function switchEd(id){
  let ev = editions.find(e=>e.id===id);
  if(!ev) return;
  curEd = ev;
  if(ev.players && ev.players.length) names = ev.players;
  if(ev.avatars && ev.avatars.length){
    avatars = ev.avatars;
  }else{
    avatars = names.map(()=>DEFAULT_AVATAR);
  }
  // 初始化录入区演员列表
  inputActors = names.map((n,i)=>({name:n, avatar:avatars[i]||DEFAULT_AVATAR}));

  let {data,error} = await sb.from('rounds').select('id,data,created_at,result').eq('edition_id',id).order('id');
  if(error){ console.error('加载对局数据失败:', error); alert('⚠️ 加载对局数据失败：\n'+error.message+'\n\n请检查 Supabase RLS 权限设置'); rounds=[]; }
  else { rounds = data.map(r=>({
    id:r.id,
    data:r.data,
    created_at:r.created_at,
    result:r.result||''
  })); }
  document.getElementById('mainTitle').textContent = '🔥 ' + ev.name;
  let timeStr = (ev.start_date||'') + (ev.end_date?' ~ '+ev.end_date:'');
  renderEdBar();
  let existingTime = document.getElementById('edTimeDisplay');
  if(!existingTime){
    existingTime = document.createElement('div');
    existingTime.id = 'edTimeDisplay';
    existingTime.style.cssText = 'text-align:center;color:#666;font-size:13px;margin-bottom:15px';
    document.getElementById('mainTitle').insertAdjacentElement('afterend', existingTime);
  }
  existingTime.textContent = timeStr;
  renderInputs();
  renderAll();
  document.getElementById('lastUpdate').textContent = '最后更新: '+new Date().toLocaleTimeString('zh-CN');
}

// ===== 新建届次弹窗 =====
function showNewEdition(){
  document.getElementById('edName').value = '2026炮门第'+(editions.length+1)+'届演员争霸赛';
  document.getElementById('edStart').value = new Date().toISOString().slice(0,10);
  document.getElementById('edEnd').value = '';
  document.getElementById('editionModal').style.display = 'flex';
}
window.showNewEdition = showNewEdition;

async function createEdition(){
  let name = document.getElementById('edName').value.trim();
  let start = document.getElementById('edStart').value;
  let end = document.getElementById('edEnd').value;
  if(!name){alert('请输入名称');return;}
  let {data,error} = await sb.from('editions').insert([{name, start_date:start, end_date:end, players:names, avatars:avatars}]).select();
  if(error){alert('创建失败:'+error.message);return;}
  editions.push(data[0]);
  document.getElementById('editionModal').style.display = 'none';
  switchEd(data[0].id);
}

// ===== 演员资料库管理 =====
function showActorMgr(){
  renderActorList();
  document.getElementById('actorModal').style.display = 'flex';
}
window.showActorMgr = showActorMgr;

function renderActorList(){
  let list = document.getElementById('actorList');
  list.innerHTML = '';
  names.forEach((n,i)=>{
    let avUrl = avatars[i]||DEFAULT_AVATAR;
    let item = document.createElement('div');
    item.className = 'actor-item';
    item.innerHTML = `
      <img src="${avUrl}" onerror="this.src='${DEFAULT_AVATAR}'" data-idx="${i}">
      <div class="actor-fields">
        <input type="text" value="${n}" placeholder="演员名" data-field="name" data-idx="${i}">
        <input type="text" value="${avUrl===DEFAULT_AVATAR?'':avUrl}" placeholder="头像URL（留空用默认头像）" data-field="avatar" data-idx="${i}">
      </div>
      <button class="btn-red" onclick="removeActor(${i})" style="flex-shrink:0">删除</button>
    `;
    // 绑定输入事件
    let nameInp = item.querySelector('[data-field="name"]');
    let avInp   = item.querySelector('[data-field="avatar"]');
    let img     = item.querySelector('img');
    nameInp.oninput = function(){ names[i] = this.value; };
    avInp.oninput   = function(){
      avatars[i] = this.value.trim() || DEFAULT_AVATAR;
      img.src = avatars[i];
    };
    list.appendChild(item);
  });
}

function addActorRow(){
  names.push('新演员');
  avatars.push(DEFAULT_AVATAR);
  renderActorList();
}
window.addActorRow = addActorRow;

function removeActor(i){
  if(names.length<=1){alert('至少保留1名演员');return;}
  names.splice(i,1);
  avatars.splice(i,1);
  renderActorList();
}
window.removeActor = removeActor;

async function saveActors(){
  if(names.length<1){alert('至少1名演员');return;}
  if(!curEd) return;
  let {error} = await sb.from('editions').update({players:names, avatars:avatars}).eq('id',curEd.id);
  if(!error){ curEd.players=names; curEd.avatars=avatars; }
  // 同步录入区演员列表
  inputActors = names.map((n,i)=>({name:n, avatar:avatars[i]||DEFAULT_AVATAR}));
  document.getElementById('actorModal').style.display = 'none';
  renderInputs();
  renderAll();
}
window.saveActors = saveActors;

// ===== 录入区：在本局临时加演员 =====
function addTempActor(){
  // 弹出选择框，从names里选一个未在inputActors中的，或手动输入
  let unused = names.filter(n=>!inputActors.find(a=>a.name===n));
  if(unused.length){
    let n = unused[0];
    let idx = names.indexOf(n);
    inputActors.push({name:n, avatar:avatars[idx]||DEFAULT_AVATAR});
  }else{
    inputActors.push({name:'临时演员', avatar:DEFAULT_AVATAR});
  }
  renderInputs();
}
window.addTempActor = addTempActor;

function removeInputActor(i){
  if(inputActors.length<=1){alert('至少保留1名演员');return;}
  inputActors.splice(i,1);
  renderInputs();
}
window.removeInputActor = removeInputActor;

// ===== 加演员弹窗 =====
window.showAddActorModal = function(){
  let sel = document.getElementById('pickActorSelect');
  sel.innerHTML = '<option value="">-- 请选择资料库演员 --</option>';
  // 显示资料库所有演员，已添加的标注"已添加"
  names.forEach((n,i)=>{
    let o = document.createElement('option');
    o.value = n;
    o.textContent = inputActors.find(a=>a.name===n)
      ? n + '（已添加，可重复添加）'
      : n;
    sel.appendChild(o);
  });
  document.getElementById('customActorName').value = '';
  document.getElementById('saveToLib').checked = true;
  document.getElementById('addActorModal').style.display = 'flex';
};

window.confirmAddActor = async function(){
  let sel = document.getElementById('pickActorSelect');
  let customName = document.getElementById('customActorName').value.trim();
  let saveToLib = document.getElementById('saveToLib').checked;
  let nameToAdd = sel.value || customName;
  if(!nameToAdd){alert('请选择或输入演员名称');return;}
  // 如果自定义名称且要保存到资料库
  if(saveToLib && !names.includes(nameToAdd)){
    names.push(nameToAdd);
    avatars.push(DEFAULT_AVATAR);
    // 同步保存到本届次资料库
    if(curEd){
      let {error} = await sb.from('editions').update({players:names, avatars:avatars}).eq('id',curEd.id);
      if(!error){ curEd.players = names; curEd.avatars = avatars; }
    }
  }
  let idx = names.indexOf(nameToAdd);
  let avatar = idx>=0 ? (avatars[idx]||DEFAULT_AVATAR) : DEFAULT_AVATAR;
  inputActors.push({name:nameToAdd, avatar});
  document.getElementById('addActorModal').style.display = 'none';
  renderInputs();
};

function renderInputs(){
  let c = document.getElementById('playerInputs');
  c.innerHTML = inputActors.map((actor,i)=>`
    <div class="player-card" data-idx="${i}">
      <button class="card-del" onclick="removeInputActor(${i})" title="移除">✕</button>
      <img src="${actor.avatar}" class="player-avatar" onerror="this.src='${DEFAULT_AVATAR}'">
      <input class="player-name-input" value="${actor.name}" placeholder="演员名" data-idx="${i}"
             style="width:90%;margin:4px auto 6px;padding:4px;background:#3a4150;color:#ff4655;font-weight:bold;border:1px solid #3a4150;border-radius:4px;font-size:12px;text-align:center;display:block">
      <div class="input-group"><label>K</label><input type="number" class="k" min="0" placeholder="击杀"></div>
      <div class="input-group"><label>D</label><input type="number" class="d" min="0" placeholder="死亡"></div>
      <div class="input-group"><label>A</label><input type="number" class="a" min="0" placeholder="助攻"></div>
      <div class="input-group"><label>RT</label><input type="text" class="rtxt" placeholder="手动输入RT" style="background:#2d323f;color:#ff4655;font-weight:bold;border:1px solid #3a4150;text-align:center;font-size:12px"></div>
      <div class="input-group"><label>ADR</label><input type="number" class="adr" min="0" step="0.1" placeholder="ADR"></div>
    </div>
  `).join('');

  // 绑定名字编辑事件
  c.querySelectorAll('.player-name-input').forEach(inp=>{
    inp.addEventListener('input', function(){
      let idx = +this.dataset.idx;
      if(inputActors[idx]) inputActors[idx].name = this.value.trim() || '未命名';
    });
  });

  c.querySelectorAll('.player-card').forEach(card=>{
    let ki=card.querySelector('.k'), di=card.querySelector('.d'), rt=card.querySelector('.rtxt');
    function up(){
      if(!rt.value || rt.value==='-'){
        let k=+ki.value||0, d=+di.value||0;
        if(k||d) rt.value=calcRT(k,d);
      }
    }
    ki.oninput=up; di.oninput=up;
    rt.onfocus=()=>{ if(rt.value==='-') rt.value=''; };
    rt.onblur=()=>{ if(!rt.value) rt.value='-'; };
  });
}

// ===== 提交本局 =====
async function addRound(){
  if(!curEd){alert('请先创建届次');return;}
  let result = document.getElementById('roundResult').value; // 'win'|'lose'|''
  let row=[], has=false;
  document.querySelectorAll('#playerInputs .player-card').forEach((c,i)=>{
    let k=+c.querySelector('.k').value||0;
    let d=+c.querySelector('.d').value||0;
    let a=+c.querySelector('.a').value||0;
    let rtInput=c.querySelector('.rtxt').value;
    let rt=(rtInput && rtInput!=='-') ? parseFloat(rtInput) : calcRT(k,d);
    let adr=parseFloat(c.querySelector('.adr').value)||0;
    let name=inputActors[i]?inputActors[i].name:(names[i]||'?');
    if(k||d||a||adr) has=true;
    row.push({k,d,a,rt,adr,name});
  });
  if(!has){alert('请填写数据');return;}
  let payload={data:row, edition_id:curEd.id};
  if(result) payload.result=result;
  let {data,error} = await sb.from('rounds').insert([payload]).select();
  if(error){alert('提交失败:'+error.message);return;}
  let insertedResult = data[0].result || result;
  rounds.push({id:data[0].id, data:row, created_at:data[0].created_at, result:insertedResult});
  renderAll();
  document.querySelectorAll('#playerInputs .k,.d,.a,.adr').forEach(i=>i.value='');
  document.querySelectorAll('#playerInputs .rtxt').forEach(i=>i.value='-');
  document.getElementById('roundResult').value='';
  document.getElementById('lastUpdate').textContent = '最后更新: '+new Date().toLocaleTimeString('zh-CN');
}

// ===== 删除某局 =====
async function deleteRound(id){
  if(!confirm('删除这一局？')) return;
  let {error} = await sb.from('rounds').delete().eq('id',id);
  if(error){alert('删除失败');return;}
  rounds = rounds.filter(r=>r.id!==id);
  renderAll();
}

// ===== 清空本届 =====
async function clearAll(){
  if(!confirm('⚠️ 清空本届所有数据？不可恢复！')) return;
  if(!confirm('再次确认？')) return;
  if(!rounds.length) return;
  let ids = rounds.map(r=>r.id);
  let {error} = await sb.from('rounds').delete().in('id',ids);
  if(error){alert('清空失败');return;}
  rounds=[]; renderAll();
}

// ===== 渲染演员实力表 =====
function renderRank(){
  let tb = document.getElementById('rankBody');
  if(!rounds.length){
    tb.innerHTML='<tr><td colspan="8" style="color:#666">暂无数据</td></tr>';
    return;
  }
  // 收集所有出现过的演员名
  let actorMap = {}; // name -> {k,d,a,rt,adr,count}
  rounds.forEach(r=>{
    r.data.forEach((p,idx)=>{
      // 优先用 p.name，没有则用 names[idx]（兼容v1无name字段的旧数据）
      let n = p.name || (names[idx]||'未知');
      if(!actorMap[n]) actorMap[n]={k:0,d:0,a:0,rt:0,adr:0,count:0};
      actorMap[n].k   += p.k||0;
      actorMap[n].d   += p.d||0;
      actorMap[n].a   += p.a||0;
      actorMap[n].rt  += p.rt||0;
      actorMap[n].adr += p.adr||0;
      actorMap[n].count++;
    });
  });
  let rank = Object.entries(actorMap).map(([name,s])=>({
    name,
    k:s.k, d:s.d, a:s.a,
    avgRt: s.count>0 ? (s.rt/s.count).toFixed(2) : '0.00',
    avgAdr: s.count>0 ? (s.adr/s.count).toFixed(1) : '0.0',
    count: s.count
  }));
  rank.sort((a,b)=>a.avgRt-b.avgRt);
  tb.innerHTML = rank.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td style="color:#ff4655;font-weight:bold">${r.name}</td>
      <td>${r.k}</td><td>${r.d}</td><td>${r.a}</td>
      <td class="avg-rt">${r.avgRt}</td>
      <td class="avg-adr">${r.avgAdr}</td>
      <td>${r.count}</td>
    </tr>
  `).join('');
}

// ===== 渲染每局详情（最新在上）=====
function renderLogs(){
  let c = document.getElementById('logs');
  let t = c.querySelector('.section-title');
  c.innerHTML=''; c.appendChild(t);
  if(!rounds.length){
    c.innerHTML+='<div style="color:#666;text-align:center;padding:20px">暂无数据</div>';
    return;
  }
  // 倒序：最新在上
  let sorted = [...rounds].reverse();
  sorted.forEach((r,revIdx)=>{
    let realIdx = rounds.length - revIdx; // 真实局数
    let d = document.createElement('div');
    d.className='round-item';
    let resultBadge = r.result
      ? `<span class="win-badge ${r.result}">${r.result==='win'?'胜':'负'}</span>`
      : '';
    d.innerHTML=`
      <div class="round-item-header">
        <span class="round-title">第${realIdx}局 · ${new Date(r.created_at).toLocaleString('zh-CN')}</span>
        <div style="display:flex;align-items:center;gap:8px">
          ${resultBadge}
          <button class="btn-red" onclick="deleteRound(${r.id})">删除</button>
        </div>
      </div>
      <div class="round-grid">${r.data.map((p,idx)=>`
        <div>
          <div class="cell-name">${p.name || (names[idx]||'?')}</div>
          <div class="cell-kda">${p.k}/${p.d}/${p.a}</div>
          <div class="cell-rt">RT: ${p.rt}</div>
          ${p.adr?`<div class="cell-adr">ADR: ${p.adr}</div>`:''}
        </div>
      `).join('')}</div>
    `;
    c.appendChild(d);
  });
}

// ===== 总渲染 =====
function renderAll(){
  document.getElementById('roundCount').textContent = rounds.length;
  // 统计胜负
  let wins = rounds.filter(r=>r.result==='win').length;
  let loses = rounds.filter(r=>r.result==='lose').length;
  document.getElementById('winCount').textContent  = wins;
  document.getElementById('loseCount').textContent = loses;
  renderRank(); renderLogs();
  let ld = document.getElementById('loading');
  if(ld && rounds.length) ld.style.display='none';
}

// ===== 启动 =====
(async ()=>{
  if(await initSB()){
    await ensureTables();
    await loadEditions();
  }
  document.getElementById('addBtn').onclick = addRound;
  document.getElementById('clearBtn').onclick = clearAll;
  ['editionModal','actorModal','addActorModal'].forEach(id=>{
    document.getElementById(id).addEventListener('click',function(e){
      if(e.target===this) this.style.display='none';
    });
  });
})();
</script>
